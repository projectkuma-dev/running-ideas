<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b5cff" />
  <meta name="description" content="Capture running ideas one-handed and email them after your run." />

  <title>Running Ideas</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ============ CAPTURE SCREEN ============ -->
  <section id="capture-screen" class="screen" data-active>
    <header class="app-header">
      <h1 class="app-title">Running Ideas</h1>
      <button id="goto-history-btn" class="btn btn-icon" type="button" aria-label="Sent history">🕘</button>
      <span id="idea-count" class="idea-count" aria-live="polite">0</span>
    </header>

    <main class="idea-list-wrap">
      <ul id="idea-list" class="idea-list" aria-label="Captured ideas"></ul>
      <p id="empty-state" class="empty-state">No ideas yet. Tap the field and go.</p>
    </main>

    <footer class="capture-bar">
      <label class="sr-only" for="idea-input">New idea</label>
      <textarea
        id="idea-input"
        class="idea-input"
        rows="1"
        inputmode="text"
        autocomplete="off"
        autocapitalize="sentences"
        placeholder="What's the idea?"
        enterkeyhint="done"></textarea>

      <button id="add-btn" class="btn btn-primary btn-add" type="button">
        Add Idea
      </button>

      <button id="goto-send-btn" class="btn btn-ghost btn-send-link" type="button">
        Review &amp; Send →
      </button>
    </footer>
  </section>

  <!-- ============ TRIAGE / SEND SCREEN ============ -->
  <section id="send-screen" class="screen" hidden>
    <header class="app-header">
      <button id="back-btn" class="btn btn-icon" type="button" aria-label="Back to capture">←</button>
      <h1 class="app-title">Review &amp; Send</h1>
    </header>

    <main class="send-body">
      <div class="bulk-row">
        <span class="bulk-label">All to:</span>
        <button class="btn btn-bulk" type="button" data-bulk="work">Work</button>
        <button class="btn btn-bulk" type="button" data-bulk="personal">Personal</button>
      </div>

      <p class="triage-hint">Tap an idea to edit it. Route each one, then send.</p>

      <ul id="triage-list" class="triage-list" aria-label="Ideas to review"></ul>
    </main>

    <footer class="send-bar">
      <button id="send-btn" class="btn btn-primary btn-add" type="button">
        Send to Email
      </button>
    </footer>
  </section>

  <!-- ============ HISTORY SCREEN ============ -->
  <section id="history-screen" class="screen" hidden>
    <header class="app-header">
      <button id="history-back-btn" class="btn btn-icon" type="button" aria-label="Back to capture">←</button>
      <h1 class="app-title">History</h1>
    </header>

    <div class="history-search-wrap">
      <label class="sr-only" for="history-search">Search sent ideas</label>
      <input
        id="history-search"
        class="history-search"
        type="search"
        inputmode="search"
        autocomplete="off"
        placeholder="Search sent ideas…" />
    </div>

    <main class="idea-list-wrap">
      <ul id="history-list" class="idea-list" aria-label="Sent ideas"></ul>
      <p id="history-empty" class="empty-state">Nothing sent yet. Ideas land here after you send them.</p>
    </main>
  </section>

  <!-- ============ SUCCESS OVERLAY ============ -->
  <div id="success-overlay" class="overlay" hidden>
    <div class="success-card" role="dialog" aria-labelledby="success-title" aria-modal="true">
      <div class="success-check" aria-hidden="true">✓</div>
      <h2 id="success-title" class="success-title">Sent!</h2>
      <p id="success-msg" class="success-msg"></p>
      <button id="done-btn" class="btn btn-primary btn-add" type="button">
        Done
      </button>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
